<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파이썬 문제풀이</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <span class="brand">🐍 파이썬 문제풀이</span>
  </nav>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🐍</div>
      <h1 class="login-title">파이썬 문제풀이</h1>
      <p class="login-desc">Google 계정으로 로그인하고<br>파이썬 코딩 문제를 풀어보세요!</p>
      <button class="btn btn-google" id="login-btn">
        <svg width="20" height="20" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google로 로그인
      </button>
      <p class="login-note">로그인하면 풀이 진행 상황이 자동 저장됩니다.</p>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, onAuthStateChanged, GoogleAuthProvider }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyAgFbYZPf9f7MXIcO6RaA3Zfv9sJgP-uSE",
      authDomain: "cbtdb-ee6b6.firebaseapp.com",
      projectId: "cbtdb-ee6b6",
      storageBucket: "cbtdb-ee6b6.firebasestorage.app",
      messagingSenderId: "264536322200",
      appId: "1:264536322200:web:a3d06f21dd0b747abce0ed"
    });
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => {
      if (user) location.href = "dashboard.html";
    });

    document.getElementById("login-btn").addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (e) {
        alert("로그인 실패: " + e.message);
      }
    });
  </script>
</body>
</html>
